name: ${API_COMPOSE_PROJECT_NAME:-udaya_pacs_api}

x-api-common: &api-common
  image: ${APP_IMAGE:-udaya_pacs_local_api:latest}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  init: true
  read_only: true
  cap_drop:
    - ALL
  stop_grace_period: 30s
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=64m,mode=1777
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/pacsApi/actuator/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 40s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  volumes:
    - ${KEY_PATH:-./src/main/resources/key}:/app/config/key:ro
    - ${HOSPITAL_IMAGE_HOST_PATH:-./runtime-image}:/var/ut-image
    - ${PACS_DICOM_UPLOAD_TEMP_HOST_PATH:-../runtime-dicom-upload-temp}:/var/ut-dicom-upload-temp

x-redis-common: &redis-common
  image: ${REDIS_IMAGE:-redis:7-alpine}
  restart: unless-stopped
  init: true
  command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\" --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}"]
  healthcheck:
    test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 10s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  udaya_pacs_local_redis:
    <<: *redis-common
    container_name: ${LOCAL_REDIS_CONTAINER_NAME:-udaya_pacs_local_redis}
    profiles: ["local"]
    environment:
      REDIS_PASSWORD: ${LOCAL_REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:${LOCAL_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - udaya_pacs_local_redis_data:/data

  udaya_pacs_local_api:
    <<: *api-common
    container_name: ${LOCAL_API_CONTAINER_NAME:-udaya_pacs_local_api}
    profiles: ["local"]
    depends_on:
      udaya_pacs_local_redis:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
      APP_CACHE_PROVIDER: ${APP_CACHE_PROVIDER:-redis}
      APP_CACHE_TTL_SECONDS: ${APP_CACHE_TTL_SECONDS:-600}
      APP_CACHE_MAX_ENTRIES: ${APP_CACHE_MAX_ENTRIES:-5000}
      APP_CACHE_REDIS_KEY_PREFIX: ${APP_CACHE_REDIS_KEY_PREFIX:-udaya_pacs_local}
      APP_CACHE_REDIS_HEALTH_ENABLED: ${APP_CACHE_REDIS_HEALTH_ENABLED:-true}
      REDIS_HOST: ${LOCAL_REDIS_CONTAINER_NAME:-udaya_pacs_local_redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${LOCAL_REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-2s}
      PACS_CACHE_SCHEDULER_ENABLED: ${PACS_CACHE_SCHEDULER_ENABLED:-true}
      PACS_PARTITION_SCHEDULER_ENABLED: ${PACS_PARTITION_SCHEDULER_ENABLED:-true}
      SECURITY_JWT_REFRESH_TOKEN_ENCRYPTION_KEY: ${LOCAL_SECURITY_JWT_REFRESH_TOKEN_ENCRYPTION_KEY:-}
      API_AUTH_URL: ${LOCAL_API_AUTH_URL:-http://localhost:8080/pacsApi}
      SPRINGDOC_SERVER_URL: ${LOCAL_SPRINGDOC_SERVER_URL:-}
      HOSPITAL_IMAGE_ROOT_PATH: ${HOSPITAL_IMAGE_ROOT_PATH:-/var/ut-image}
      PACS_DICOM_UPLOAD_TEMP_DIR: ${PACS_DICOM_UPLOAD_TEMP_DIR:-/var/ut-image/tmp/dicom-upload}
      SPRING_SERVLET_MULTIPART_LOCATION: ${SPRING_SERVLET_MULTIPART_LOCATION:-/var/ut-image}
      APP_SECURITY_DICOM_UPLOAD_MAX_REQUEST_BYTES: ${APP_SECURITY_DICOM_UPLOAD_MAX_REQUEST_BYTES:-4294967296}
      APP_SECURITY_DICOM_UPLOAD_MAX_TRANSPORT_REQUEST_BYTES: ${APP_SECURITY_DICOM_UPLOAD_MAX_TRANSPORT_REQUEST_BYTES:-4362076160}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-4GB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-4160MB}
      PACS_DICOM_SERVER_CLIENT_READ_TIMEOUT_MS: ${PACS_DICOM_SERVER_CLIENT_READ_TIMEOUT_MS:-7200000}
      PACS_RESULT_STATIC_AUTH_ENABLED: ${PACS_RESULT_STATIC_AUTH_ENABLED:-true}
      PACS_RESULT_API_KEY: ${PACS_RESULT_API_KEY:-}
      PACS_RESULT_UPLOAD_ROOT: ${PACS_RESULT_UPLOAD_ROOT:-/var/ut-image}
      PACS_RESULT_MAX_IMAGE_BYTES: ${PACS_RESULT_MAX_IMAGE_BYTES:-10485760}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173,http://localhost:3005,http://127.0.0.1:3005}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      TZ: ${TZ:-Asia/Phnom_Penh}
    ports:
      - "${LOCAL_API_PORT:-8080}:8080"

