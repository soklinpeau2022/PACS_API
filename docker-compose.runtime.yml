name: ${API_COMPOSE_PROJECT_NAME:-udaya_pacs_api}

x-api-common: &api-common
  image: ${APP_IMAGE:-udaya_pacs_local_api:latest}
  restart: unless-stopped
  init: true
  read_only: true
  cap_drop:
    - ALL
  stop_grace_period: 30s
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=64m,mode=1777
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/pacsApi/actuator/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 40s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  volumes:
    - ${KEY_PATH:-./key}:/app/config/key:ro
    - ${HOSPITAL_IMAGE_HOST_PATH:-./runtime-image}:${HOSPITAL_IMAGE_ROOT_PATH:-/home/Images}
    - ${PACS_DICOM_UPLOAD_TEMP_HOST_PATH:-./runtime-image/tmp/dicom-upload}:${PACS_DICOM_UPLOAD_TEMP_DIR:-/home/Images/tmp/dicom-upload}
    - ${PACS_DICOM_SERVER_BASE_IMAGE_ARCHIVE_HOST_PATH:-./dicom-server-images/dicom_server_base.tar}:${PACS_DICOM_SERVER_BASE_IMAGE_ARCHIVE_CONTAINER_PATH:-/app/dicom-server-images/dicom_server_base.tar}:ro

services:
  udaya_pacs_local_api:
    <<: *api-common
    container_name: ${LOCAL_API_CONTAINER_NAME:-udaya_pacs_local_api}
    profiles: ["local"]
    env_file:
      - .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
      PACS_CACHE_SCHEDULER_ENABLED: ${PACS_CACHE_SCHEDULER_ENABLED:-true}
      PACS_PARTITION_SCHEDULER_ENABLED: ${PACS_PARTITION_SCHEDULER_ENABLED:-true}
      SECURITY_JWT_REFRESH_TOKEN_ENCRYPTION_KEY: ${LOCAL_SECURITY_JWT_REFRESH_TOKEN_ENCRYPTION_KEY:-}
      API_AUTH_URL: ${LOCAL_API_AUTH_URL:-http://localhost:8080/pacsApi}
      SPRINGDOC_SERVER_URL: ${LOCAL_SPRINGDOC_SERVER_URL:-}
      HOSPITAL_IMAGE_ROOT_PATH: ${HOSPITAL_IMAGE_ROOT_PATH:-/home/Images}
      PACS_APPLICATION_BRAND_ASSET_ROOT: ${PACS_APPLICATION_BRAND_ASSET_ROOT:-/home/Images/application-brand}
      PACS_DICOM_UPLOAD_TEMP_DIR: ${PACS_DICOM_UPLOAD_TEMP_DIR:-/home/Images/tmp/dicom-upload}
      SPRING_SERVLET_MULTIPART_LOCATION: ${SPRING_SERVLET_MULTIPART_LOCATION:-/home/Images/tmp/dicom-upload}
      PACS_DICOM_UPLOAD_INSTANCE_PARALLELISM: ${PACS_DICOM_UPLOAD_INSTANCE_PARALLELISM:-24}
      PACS_DICOM_UPLOAD_MAX_CONCURRENT_PROCESSING_JOBS: ${PACS_DICOM_UPLOAD_MAX_CONCURRENT_PROCESSING_JOBS:-1}
      PACS_DICOM_UPLOAD_INSTANCE_MAX_ATTEMPTS: ${PACS_DICOM_UPLOAD_INSTANCE_MAX_ATTEMPTS:-8}
      PACS_DICOM_UPLOAD_INSTANCE_RETRY_BACKOFF_MS: ${PACS_DICOM_UPLOAD_INSTANCE_RETRY_BACKOFF_MS:-500}
      PACS_DICOM_UPLOAD_IN_MEMORY_ENTRY_MAX_BYTES: ${PACS_DICOM_UPLOAD_IN_MEMORY_ENTRY_MAX_BYTES:-1048576}
      APP_SECURITY_DICOM_UPLOAD_MAX_REQUEST_BYTES: ${APP_SECURITY_DICOM_UPLOAD_MAX_REQUEST_BYTES:-4294967296}
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:-4GB}
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:-4GB}
      PACS_DICOM_SERVER_CLIENT_READ_TIMEOUT_MS: ${PACS_DICOM_SERVER_CLIENT_READ_TIMEOUT_MS:-7200000}
      DICOM_SERVER_HEALTH_TIMEOUT_MS: ${DICOM_SERVER_HEALTH_TIMEOUT_MS:-5000}
      DICOM_SERVER_HEALTH_OFFLINE_FAILURE_THRESHOLD: ${DICOM_SERVER_HEALTH_OFFLINE_FAILURE_THRESHOLD:-3}
      DICOM_SERVER_HEALTH_OFFLINE_GRACE_MS: ${DICOM_SERVER_HEALTH_OFFLINE_GRACE_MS:-180000}
      PACS_RESULT_STATIC_AUTH_ENABLED: ${PACS_RESULT_STATIC_AUTH_ENABLED:-true}
      PACS_RESULT_API_KEY: ${PACS_RESULT_API_KEY:-}
      PACS_RESULT_UPLOAD_ROOT: ${PACS_RESULT_UPLOAD_ROOT:-/home/Images/uploads/pacs-results}
      PACS_RESULT_MAX_IMAGE_BYTES: ${PACS_RESULT_MAX_IMAGE_BYTES:-10485760}
      PACS_DICOM_SERVER_PACKAGE_INCLUDE_BASE_IMAGE: ${PACS_DICOM_SERVER_PACKAGE_INCLUDE_BASE_IMAGE:-false}
      PACS_DICOM_SERVER_PACKAGE_BASE_IMAGE_ARCHIVE_PATH: ${PACS_DICOM_SERVER_PACKAGE_BASE_IMAGE_ARCHIVE_PATH:-}
      PACS_DICOM_SERVER_PACKAGE_MAX_EMBEDDED_BASE_IMAGE_BYTES: ${PACS_DICOM_SERVER_PACKAGE_MAX_EMBEDDED_BASE_IMAGE_BYTES:-67108864}
      PACS_DICOM_SERVER_PACKAGE_DOWNLOAD_TEMP_DIR: ${PACS_DICOM_SERVER_PACKAGE_DOWNLOAD_TEMP_DIR:-/home/Images/tmp/dicom-routing-downloads}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173,http://localhost:3005,http://127.0.0.1:3005}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      TZ: ${TZ:-Asia/Phnom_Penh}
    ports:
      - "${LOCAL_API_BIND_HOST:-127.0.0.1}:${LOCAL_API_PORT:-8080}:8080"

