spring.application.name=UDAYA_PACS_API
spring.profiles.active=local

server.port=8080
server.servlet.context-path=/pacsApi
server.forward-headers-strategy=native
server.tomcat.threads.max=200
spring.mvc.async.request-timeout=${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:7200000}
server.from=LOCAL

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=PACSPool
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_DETECTION_THRESHOLD:60000}
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
spring.datasource.hikari.data-source-properties.prepareThreshold=3
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=256
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=16

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-disabled=true
spring.flyway.clean-on-validation-error=false
spring.flyway.validate-on-migrate=true
spring.flyway.validate-migration-naming=true
spring.flyway.out-of-order=false
spring.flyway.fail-on-missing-locations=true
spring.flyway.postgresql.transactional-lock=false
spring.flyway.init-sql=CREATE EXTENSION IF NOT EXISTS pgcrypto; CREATE EXTENSION IF NOT EXISTS pg_trgm;
dashboard.studies-count-source=summary
pacs.maintenance.partitions.enabled=${PACS_PARTITION_SCHEDULER_ENABLED:${PACS_MAINTENANCE_PARTITIONS_ENABLED:true}}
pacs.maintenance.partitions.monthly-cron=${PACS_MAINTENANCE_PARTITIONS_MONTHLY_CRON:0 0 2 1 * *}
pacs.maintenance.week-cache.enabled=${PACS_CACHE_SCHEDULER_ENABLED:${PACS_MAINTENANCE_WEEK_CACHE_ENABLED:true}}
pacs.maintenance.week-cache.weekly-cron=${PACS_MAINTENANCE_WEEK_CACHE_WEEKLY_CRON:0 0 2 * * MON}
pacs.maintenance.week-cache.cleanup-cron=${PACS_MAINTENANCE_WEEK_CACHE_CLEANUP_CRON:0 30 2 * * *}

mybatis.mapper-locations=classpath*:mybatis/postgresql/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.cache-enabled=true
mybatis.configuration.jdbc-type-for-null=NULL
mybatis.configuration.default-executor-type=reuse
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=20
mybatis.configuration.local-cache-scope=STATEMENT
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis.type-handlers-package=com.ut.emrPacs.config.mybatis.typehandler

security.jwt.issuer=udaya_pacs_api
security.jwt.audience=pacs-web
security.jwt.private-key=classpath:key/private_key.pem
security.jwt.public-key=classpath:key/public_key.pem
security.jwt.auto-generate-keys=true
security.jwt.key-id=${SECURITY_JWT_KEY_ID:local-dev-key}
security.jwt.access-token-ms=3600000
security.jwt.refresh-token-ms=2592000000
security.jwt.refresh-token-encryption-key=${LOCAL_SECURITY_JWT_REFRESH_TOKEN_ENCRYPTION_KEY:}
security.jwt.refresh-token-allow-body=true
security.jwt.refresh-token-return-in-body=true
security.jwt.access-token-return-in-body=true

security.login.max-failed-attempts=5
security.login.lock-minutes=15

security.permission.cache-ttl-seconds=300
security.permission.endpoint-cache-ttl-seconds=600
security.permission.endpoint-rules-refresh-seconds=60

app.security.rate-limit.enabled=true
app.security.rate-limit.login-window-seconds=60
app.security.rate-limit.login-max-requests=5
app.security.rate-limit.public-viewer-window-seconds=300
app.security.rate-limit.public-viewer-max-requests=5
app.security.public-viewer.link-window-seconds=900
app.security.public-viewer.link-max-failures=10
app.security.rate-limit.api-window-seconds=60
app.security.rate-limit.api-max-requests=300
app.security.max-request-bytes=524288
# PACS-OHIF viewer-state saves carry measurements, annotations, contour polylines
# and sparse labelmap voxels, so they need a higher cap than the strict generic
# JSON limit above. Keep this aligned with SecurityThreatDetectionFilter's
# viewer-state cap (12 MB) and at/above the viewer's single-request threshold.
app.security.viewer-state.max-request-bytes=${APP_SECURITY_VIEWER_STATE_MAX_REQUEST_BYTES:12582912}
app.security.dicom-upload.max-request-bytes=${APP_SECURITY_DICOM_UPLOAD_MAX_REQUEST_BYTES:4294967296}
app.security.dicom-upload.max-transport-request-bytes=${APP_SECURITY_DICOM_UPLOAD_MAX_TRANSPORT_REQUEST_BYTES:4362076160}
server.tomcat.max-swallow-size=${SERVER_TOMCAT_MAX_SWALLOW_SIZE:-1}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:4GB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:4160MB}
spring.servlet.multipart.file-size-threshold=0
spring.servlet.multipart.location=${SPRING_SERVLET_MULTIPART_LOCATION:${PACS_DICOM_UPLOAD_TEMP_DIR:${java.io.tmpdir}/udaya-pacs-dicom-upload}}
pacs.dicom-upload.temp-dir=${PACS_DICOM_UPLOAD_TEMP_DIR:${spring.servlet.multipart.location:${java.io.tmpdir}/udaya-pacs-dicom-upload}}
pacs.dicom-upload.instance-parallelism=${PACS_DICOM_UPLOAD_INSTANCE_PARALLELISM:24}
pacs.dicom-upload.instance-max-attempts=${PACS_DICOM_UPLOAD_INSTANCE_MAX_ATTEMPTS:8}
pacs.dicom-upload.instance-retry-backoff-ms=${PACS_DICOM_UPLOAD_INSTANCE_RETRY_BACKOFF_MS:500}
pacs.dicom-upload.in-memory-entry-max-bytes=${PACS_DICOM_UPLOAD_IN_MEMORY_ENTRY_MAX_BYTES:1048576}
pacs.dicom-upload.max-concurrent-processing-jobs=${PACS_DICOM_UPLOAD_MAX_CONCURRENT_PROCESSING_JOBS:1}
pacs.dicom-server.client.connect-timeout-ms=${PACS_DICOM_SERVER_CLIENT_CONNECT_TIMEOUT_MS:10000}
pacs.dicom-server.client.read-timeout-ms=${PACS_DICOM_SERVER_CLIENT_READ_TIMEOUT_MS:7200000}
pacs.dicom-server.package.include-base-image=${PACS_DICOM_SERVER_PACKAGE_INCLUDE_BASE_IMAGE:false}
pacs.dicom-server.package.base-image-archive-path=${PACS_DICOM_SERVER_PACKAGE_BASE_IMAGE_ARCHIVE_PATH:}
pacs.dicom-server.package.max-embedded-base-image-bytes=${PACS_DICOM_SERVER_PACKAGE_MAX_EMBEDDED_BASE_IMAGE_BYTES:67108864}
dicom.server.health.timeout-ms=${DICOM_SERVER_HEALTH_TIMEOUT_MS:5000}
dicom.server.health.offline-failure-threshold=${DICOM_SERVER_HEALTH_OFFLINE_FAILURE_THRESHOLD:3}
dicom.server.health.offline-grace-ms=${DICOM_SERVER_HEALTH_OFFLINE_GRACE_MS:180000}
pacs.viewer.dicomweb.streaming.async-timeout-ms=${PACS_VIEWER_DICOMWEB_STREAMING_ASYNC_TIMEOUT_MS:${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:7200000}}
pacs.viewer.dicomweb.streaming.core-pool-size=${PACS_VIEWER_DICOMWEB_STREAMING_CORE_POOL_SIZE:16}
pacs.viewer.dicomweb.streaming.max-pool-size=${PACS_VIEWER_DICOMWEB_STREAMING_MAX_POOL_SIZE:128}
pacs.viewer.dicomweb.streaming.queue-capacity=${PACS_VIEWER_DICOMWEB_STREAMING_QUEUE_CAPACITY:512}

app.security.swagger-public=false
app.security.block-patch=true
app.security.block-trace=true
app.security.public-registration=false
app.security.permissions.enabled=true
app.security.permissions.deny-when-unknown=false
app.security.permissions.skip-paths=/role/role-menu,/user/user-me,/user-profile/**
app.security.permissions.client-allow-paths=/worklist/worklist-received-study
app.security.permissions.client-allow-client-ids=
app.security.permissions.module-aliases=
app.security.admin.authorities=ROLE_ADMIN,ROLE_SUPER_ADMIN,ROLE_SYSTEM_ADMIN

pacs.default-timezone=Asia/Phnom_Penh
hospital.image.root-path=${HOSPITAL_IMAGE_ROOT_PATH:/var/ut-image}
pacs.result.static-auth.enabled=${PACS_RESULT_STATIC_AUTH_ENABLED:true}
pacs.result.static-auth.api-key=${PACS_RESULT_API_KEY:}
pacs.result.upload-root=${PACS_RESULT_UPLOAD_ROOT:${HOSPITAL_IMAGE_ROOT_PATH:/var/ut-image}}
pacs.result.max-image-bytes=${PACS_RESULT_MAX_IMAGE_BYTES:10485760}
pacs.viewer.dicomweb.token-ms=${PACS_VIEWER_DICOMWEB_TOKEN_MS:86400000}
pacs.viewer.api-key.edit-ms=${PACS_VIEWER_API_KEY_EDIT_MS:86400000}
pacs.viewer.api-key.read-ms=${PACS_VIEWER_API_KEY_READ_MS:86400000}
pacs.viewer.api-key.public-ms=${PACS_VIEWER_API_KEY_PUBLIC_MS:86400000}

# Swagger/OpenAPI (single source, no duplicates)
# Keep springdoc.server-url blank for auto-host mode. Swagger will use /pacsApi
# and follow whichever host opened it: localhost, LAN IP, QA, PROD, or proxy.
# Set SPRINGDOC_SERVER_URL only for a fixed public gateway URL, or comma-separate
# multiple public URLs if you intentionally need more than one server choice.
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.server-url=
springdoc.show-actuator=false

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.urlsPrimaryName=0.ALL_APIs
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.show-common-extensions=true
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.defaultModelsExpandDepth=1
springdoc.swagger-ui.defaultModelExpandDepth=2
springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.deep-linking=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

spring.jackson.default-property-inclusion=non_null

# Large viewer-state JSON is highly compressible (coordinates, voxel indices,
# labels, and repeated field names). Compress responses before the viewer proxy.
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/problem+json,text/html,text/plain,text/css,text/javascript,application/javascript

# Cache provider:
# - caffeine: local in-process cache, best for local/dev and single API container.
# - redis: shared cache for QA/prod multi-container deployments.
app.cache.provider=${APP_CACHE_PROVIDER:caffeine}
app.cache.ttl-seconds=${APP_CACHE_TTL_SECONDS:600}
app.cache.max-entries=${APP_CACHE_MAX_ENTRIES:5000}
app.cache.redis.key-prefix=${APP_CACHE_REDIS_KEY_PREFIX:udaya_pacs}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.repositories.enabled=false
management.health.redis.enabled=${APP_CACHE_REDIS_HEALTH_ENABLED:false}

spring.web.error.include-stacktrace=never
spring.web.error.include-message=never
spring.web.error.include-exception=false
spring.web.error.include-binding-errors=never
spring.web.error.whitelabel.enabled=false


cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:}
cors.allowCredentials=${CORS_ALLOW_CREDENTIALS:false}
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS,HEAD
cors.allowedHeaders=Origin,Content-Type,Accept,X-Requested-With,Authorization,X-PACS-VIEWER-ACCESS,X-PACS-VIEWER-API-KEY,X-PACS-RESULT-API-KEY,X-API-KEY,Range,If-None-Match,If-Modified-Since,Cache-Control,Pragma
cors.exposedHeaders=Authorization,Content-Type,Content-Length,Content-Range,Accept-Ranges,ETag,Last-Modified,Content-Disposition
cors.maxAgeSeconds=3600

api.authUrl=${API_AUTH_URL:}

logging.level.com.ut.emrPacs=INFO
logging.level.com.ut.emrPacs.mapper=INFO
logging.level.org.mybatis=INFO
logging.level.org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker=ERROR
logging.level.org.springframework.context.support=ERROR

# Do not hardcode secrets in source control.
telegram.chat.id=${LOCAL_TELEGRAM_CHAT_ID:${TELEGRAM_CHAT_ID:}}
telegram.api.token=${LOCAL_TELEGRAM_API_TOKEN:${TELEGRAM_API_TOKEN:}}
telegram.alerts.enabled=${TELEGRAM_ALERTS_ENABLED:true}
